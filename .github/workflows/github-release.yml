name: Github Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    release:
        runs-on: windows-latest

        env:
            Csproj: src\BandcampDownloader\BandcampDownloader.csproj
            Configuration: Release
            PublishOutput: artifacts
            PublishedExe: artifacts\BandcampDownloader.exe
            PublishedZip: artifacts\BandcampDownloader.zip
            Changelog: CHANGELOG.md

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x
            - name: Display dotnet version
              run: dotnet --version

            - name: Publish project
              run: dotnet publish --configuration $env:Configuration --output $env:PublishOutput $env:Csproj

            - name: Create archive
              run: Compress-Archive -Path $env:PublishedExe -DestinationPath $env:PublishedZip

            - name: Get changelog entry
              id: changelog_reader
              uses: mindsers/changelog-reader-action@v2
              with:
                  validation_level: warn
                  validation_depth: 1
                  version: ${{ github.ref_name }}
                  path: $env:Changelog

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  name: ${{ steps.changelog_reader.outputs.version }}
                  body: ${{ steps.changelog_reader.outputs.changes }}
                  files: $env:PublishedZip
