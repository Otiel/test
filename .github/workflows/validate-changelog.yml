name: CI

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    # Validate changelog
    validate-changelog:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Get changelog entry
              # uses: mindsers/changelog-reader-action@v2
              uses: coditory/changelog-parser@v1
              with:
                  path: CHANGELOG.md
